# 工作流名称：自动抓取新闻并生成 JSON
name: Auto Generate AI News JSON

# 触发条件：手动触发 + 每30分钟自动触发
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  generate-news-json:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置 Python 环境
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 步骤3：安装依赖（国内源兜底）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then 
            pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          fi
          pip install requests feedparser python-dotenv beautifulsoup4 -i https://pypi.tuna.tsinghua.edu.cn/simple

      # 步骤4：复制 OPML 模板（仅运行用，不提交）
      - name: Copy OPML template
        run: |
          cp feeds/follow.example.opml feeds/follow.opml

      # 步骤5：运行抓取脚本生成 JSON
      - name: Run news update script
        run: |
          python scripts/update_news.py --output-dir data --window-hours 24 --rss-opml feeds/follow.opml

      # 步骤6：提交文件（关键修复：只提交 data/ 目录，跳过被忽略的 feeds/follow.opml）
      - name: Commit and push JSON file
        run: |
          # 配置 Git 身份
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 只添加 data/ 目录（生成的 JSON 文件），不碰被忽略的 opml 文件
          git add data/
          # 若无变更则跳过提交，避免报错
          git commit -m "Auto generate latest-24h.json $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          # 推送变更
          git push
